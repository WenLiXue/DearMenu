version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: dearmenu-db
    environment:
      POSTGRES_USER: dearmenu
      POSTGRES_PASSWORD: dearmenu123
      POSTGRES_DB: dearmenu
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dearmenu"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
